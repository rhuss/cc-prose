# Tutorial Voice Profile
# Teaching step-by-step, beginner-friendly
# Best for: Getting started guides, how-to articles, workshop content

name: "tutorial"
version: "1.0"
description: "Friendly teaching voice for step-by-step instruction"

characteristics:
  # Formality level: 0.0 = casual, 1.0 = formal
  # 0.3 = very casual, encouraging
  formality: 0.3

  # Personality level: 0.0 = neutral/objective, 1.0 = opinionated/engaged
  # 0.7 = warm, supportive
  personality: 0.7

  # Use first-person pronouns (I, we)
  first_person: true

  # Use contractions (don't, can't, won't)
  contractions: true

  # Target audience level
  audience: "beginner"

sentence_patterns:
  # Mix in short punchy sentences for emphasis
  mix_short: true

  # Maximum consecutive sentences of similar length
  max_consecutive_similar: 3

  # Target average sentence length
  avg_length_target: 14

  # Sentence length variation controls natural rhythm
  # Use EITHER 'variation' level OR explicit 'min_length'/'max_length' range
  #
  # Variation levels (default: moderate):
  #   low      = ±4 words  (uniform, consistent)
  #   moderate = ±8 words  (natural variety)
  #   high     = ±12 words (dramatic rhythm shifts)
  #
  # Alternative: explicit range (overrides variation if set)
  #   min_length: 10
  #   max_length: 26
  variation: "moderate"

  # Include rhetorical questions
  rhetorical_questions: true

elaboration:
  # How much to expand on concepts: minimal, moderate, thorough
  depth: "moderate"

  # Include context and background before main points
  provide_context: true

  # Add examples when helpful
  include_examples: true

  # Explain the "why" not just the "what"
  explain_reasoning: true

personality_traits:
  # Express opinions and reactions
  opinions: true

  # Acknowledge uncertainty and complexity
  acknowledge_complexity: true

  # Use humor sparingly
  humor: "subtle"

  # Reference personal experience
  personal_experience: true

pronoun_balance:
  # Target ratio of "you" vs "we" usage
  you_percentage: 60
  we_percentage: 40

signature_phrases:
  - "Let's start with"
  - "Don't worry if"
  - "The trick here is"
  - "You'll notice that"
  - "Now here's where it gets interesting"
  - "Let's try something"

avoid_phrases:
  - "It goes without saying"
  - "As everyone knows"
  - "Obviously"
  - "Trivially"
  - "Simply"
  - "Just"

# Example of this voice:
# "Let's start with something simple. We'll create a Pod that runs nginx.
# Don't worry if the YAML looks intimidating at first. You'll notice that
# most of it is boilerplate you can copy between projects. The trick here
# is understanding just three fields: apiVersion, kind, and spec. Let's
# try something. Open your terminal and paste this command. See what
# happens. Now here's where it gets interesting."
