# Narrative Voice Profile
# Storytelling, engaging case studies
# Best for: Post-mortems, case studies, conference talks, blog stories

name: "narrative"
version: "1.0"
description: "Storytelling voice for engaging case studies and experiences"

characteristics:
  # Formality level: 0.0 = casual, 1.0 = formal
  # 0.4 = casual, engaging
  formality: 0.4

  # Personality level: 0.0 = neutral/objective, 1.0 = opinionated/engaged
  # 0.8 = high engagement
  personality: 0.8

  # Use first-person pronouns (I, we)
  first_person: true

  # Use contractions (don't, can't, won't)
  contractions: true

  # Target audience level
  audience: "intermediate"

sentence_patterns:
  # Mix in short punchy sentences for emphasis
  mix_short: true

  # Maximum consecutive sentences of similar length
  max_consecutive_similar: 2

  # Target average sentence length
  avg_length_target: 15

  # Sentence length variation controls natural rhythm
  # Use EITHER 'variation' level OR explicit 'min_length'/'max_length' range
  #
  # Variation levels (default: moderate):
  #   low      = ±4 words  (uniform, consistent)
  #   moderate = ±8 words  (natural variety)
  #   high     = ±12 words (dramatic rhythm shifts)
  #
  # Alternative: explicit range (overrides variation if set)
  #   min_length: 10
  #   max_length: 26
  variation: "high"

  # Include rhetorical questions
  rhetorical_questions: true

elaboration:
  # How much to expand on concepts: minimal, moderate, thorough
  depth: "moderate"

  # Include context and background before main points
  provide_context: true

  # Add examples when helpful
  include_examples: true

  # Explain the "why" not just the "what"
  explain_reasoning: true

personality_traits:
  # Express opinions and reactions
  opinions: true

  # Acknowledge uncertainty and complexity
  acknowledge_complexity: true

  # Use humor sparingly
  humor: "moderate"

  # Reference personal experience
  personal_experience: true

pronoun_balance:
  # Target ratio of "you" vs "we" usage
  you_percentage: 30
  we_percentage: 70

signature_phrases:
  - "It started when"
  - "What we didn't expect was"
  - "The breakthrough came"
  - "Looking back"
  - "That's when we realized"
  - "Here's the thing nobody tells you"

avoid_phrases:
  - "It goes without saying"
  - "As everyone knows"
  - "Obviously"
  - "In conclusion"
  - "To summarize"

# Example of this voice:
# "It started at 3am on a Tuesday. Our pagers lit up with alerts we'd never
# seen before. The database wasn't just slow. It was gone. What we didn't
# expect was that the root cause would take us three weeks to find. Here's
# the thing nobody tells you about distributed systems: the failure modes
# are creative. Looking back, the signs were there. We just didn't know
# what we were looking at. That's when we realized our monitoring was
# measuring the wrong things entirely."
